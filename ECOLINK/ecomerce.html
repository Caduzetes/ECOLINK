<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoLink Store</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Sora',sans-serif;
}

body{
  background:#ffffff;
  color:#111;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  border-bottom:1px solid #eee;
}

nav h1{
  font-size:20px;
  color: #22c55e;
}

nav a{
  margin-left:25px;
  text-decoration:none;
  color:#444;
  font-size:14px;
}
.logo-nav{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-nav h1{
  font-size:20px;
  color:#22c55e;
}
.logo-nav svg{
  transition:0.3s;
}

.logo-nav:hover svg{
  transform:rotate(8deg) scale(1.1);
}
nav a:hover{
  color:#000;
}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
  padding:20px 60px;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:8px;
}

/* TÍTULO */
h2{
  text-align:center;
  margin:60px 0 30px;
  font-size:28px;
}

/* GRID PRODUTOS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  padding:0 60px;
}

/* CARD */
.card{
  border:1px solid #eee;
  border-radius:10px;
  padding:20px;
  transition:0.3s;
}

.card:hover{
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* IMAGEM */
.card img{
  width:100%;
  border-radius:8px;
  margin-bottom:15px;
}

/* TEXTO */
.card h3{
  font-size:16px;
  margin-bottom:5px;
}

.card p{
  font-size:13px;
  color:#666;
  margin-bottom:10px;
}

.card strong{
  font-size:16px;
}

/* BOTÃO */
.btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  background:#111;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#22c55e;
}

/* CARRINHO */
#carrinho{
  position:fixed;
  right:20px;
  top:100px;
  width:260px;
  background:#fff;
  border:1px solid #eee;
  padding:20px;
  border-radius:10px;
}

#carrinho h3{
  margin-bottom:10px;
}

#lista{
  max-height:200px;
  overflow:auto;
  font-size:13px;
}

.total{
  margin-top:10px;
  font-weight:bold;
}

.finalizar{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  background:#111;
  color:white;
  cursor:pointer;
}

/* RESPONSIVO */
@media(max-width:800px){
  .hero{
    grid-template-columns:1fr;
  }

  .grid{
    padding:0 20px;
  }

  nav{
    padding:20px;
  }
}

.search-box{
  position:relative;
  display:flex;
  align-items:center;
}

/* INPUT */
.pesquisa{
  padding:8px 10px 8px 35px; /* espaço pra lupa */
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}

/* ÍCONE */
.search-box i{
  position:absolute;
  left:10px;
  color:#888;
  font-size:14px;
}
.nav-right{
  display:flex;
  align-items:center;
  gap:10px;
}

/* deixa os ícones mais bonitos */
.nav-right a{
  font-size:18px;
  color:#444;
  transition:0.3s;
}

.nav-right a:hover{
  color:#22c55e;
}

/* melhora a search */
.search-box{
  position:relative;
}

.pesquisa{
  padding:8px 12px 8px 35px;
  border:1px solid #ddd;
  border-radius:20px;
  width:180px;
  transition:0.3s;
}

.pesquisa:focus{
  border-color:#22c55e;
  width:220px;
}

/* ícone lupa */
.search-box i{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  color:#888;
}
.card img{
  width:100%;
  height:180px;        /* altura fixa */
  object-fit:cover;    /* corta sem distorcer */
  border-radius:8px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo-nav">

        <svg viewBox="0 0 100 100" width="32" height="32">
          <circle 
            cx="50" cy="50" r="44"
            fill="none"
            stroke="#22c55e"
            stroke-width="4"
            stroke-linecap="round"
            stroke-dasharray="260 40"
            transform="rotate(-90 50 50)"
          />
      
          <path 
            d="M50 65 C40 55, 38 45, 50 30 C62 45, 60 55, 50 65 Z"
            fill="#22c55e"
          />
      
          <path 
            d="M50 62 C46 54, 48 44, 50 34"
            stroke="#050d08"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
          />
        </svg>
      
        <h1>EcoLink</h1>
      
      </div>
  <div>
    <div class="nav-right">
  
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" class="pesquisa" placeholder="Buscar..." maxlength="100">
        </div>
      
        <a href="carrinho.html"><i class="fa-solid fa-user"></i></a>
        <a href="#"><i class="fa-solid fa-cart-shopping"></i></a>
      
      </div>
</nav>

<!-- HERO (IMAGENS GRANDES) -->
<section class="hero">
  <img src="https://i.postimg.cc/y8w26Z4n/tec.jpg" alt="">
  <img src="https://i.postimg.cc/ZqSjDFzw/jkfsk.jpg" alt="">
</section>

<h2>Produtos Sustentáveis</h2>

<!-- PRODUTOS -->
<section class="grid">

  <div class="card">
    <img src="https://i.postimg.cc/T2sPjtnB/horta.jpg">
    <h3>Kit Horta Vertical</h3>
    <p>Ideal para espaços urbanos</p>
    <strong>R$ 149,90</strong>
  
    <button class="btn"
  onclick="irProduto(
    'Horta Vertical',
    149.9,
    'https://i.postimg.cc/T2sPjtnB/horta.jpg'
  )">
  Comprar
</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1558002038-1055907df827">
    <h3>Sensor de Qualidade do Ar</h3>
    <p>Monitoramento inteligente</p>
    <strong>R$ 299,90</strong>
   <button class="btn"
      onclick="irProduto(
        'Sensor de Ar',
        299.9,
        'https://images.unsplash.com/photo-1558002038-1055907df827'
      )">
        Comprar
      </button>
  </div>

  <div class="card">
    <img src="https://i.postimg.cc/Kj96rpKt/lixeirac.jpg">
    <h3>Lixeira de Compostagem Inteligente</h3>
    <p>Automação sustentável</p>
    <strong>R$ 199,90</strong>
    <button class="btn"
    onclick="irProduto(
      'Lixeira de Compostagem Inteligente',
      199.9,
      'https://i.postimg.cc/Kj96rpKt/lixeirac.jpg'
    )">
      Comprar
    </button>
  </div>

</section>



<script>


function irProduto(nome, preco, img){
  window.location.href =
    "comprar-horta.html?nome=" + encodeURIComponent(nome) +
    "&preco=" + preco +
    "&img=" + encodeURIComponent(img);
}

</script>

</body>
</html>
